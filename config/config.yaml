# Oil & Gas Geophysical Large Model Configuration
# ================================================

# Data Configuration
data:
  seismic:
    volume_shape: [128, 256, 256]  # (D, H, W) - depth, height, width
    time_samples: 128
    inline_range: [0, 256]
    xline_range: [0, 256]
    sample_interval_ms: 2.0  # ms

  well_log:
    num_curves: 7  # GR, RT, DEN, POR, AC, SP, CAL
    curve_names: ["GR", "RT", "DEN", "POR", "AC", "SP", "CAL"]
    sequence_length: 512
    depth_interval_m: 0.125  # meters

  batch_size: 8
  num_workers: 4
  train_ratio: 0.8

# Model Configuration
model:
  # Seismic Encoder
  seismic_encoder:
    # Backbone: 'resnet3d' | 'swin3d' | 'ncs' (NCS-Model pretrained)
    backbone: "ncs"
    in_channels: 1
    embed_dim: 768               # NCS-Base: 768; use 192 for tiny, 384 for small
    num_layers: 12               # ViT encoder layers
    num_heads: 12                # ViT attention heads
    mlp_ratio: 4.0
    dropout: 0.1
    use_checkpoint: true
    # NCS pretrained settings
    ncs_pretrained: "NorskRegnesentralSTI/NCS-v1-2.5d-base"
    ncs_mode: "2.5d"             # '3d' or '2.5d'
    img_size: [128, 256, 256]    # Input volume shape (D, H, W)
    # Legacy params (for resnet3d backward compat)
    stem_channels: 64
    depths: [2, 2, 6, 2]
    window_size: [7, 7, 7]
    patch_size: [2, 2, 2]

  # Well Log Encoder
  well_log_encoder:
    # Backbone: 'cnn_transformer' | 'wlfm' (WLFM)
    backbone: "wlfm"
    num_curves: 7
    embed_dim: 192               # WLFM-small: 192
    num_layers: 6                # Transformer layers
    num_heads: 6                 # Attention heads
    mlp_ratio: 4.0
    dropout: 0.1
    max_seq_len: 512
    use_physics_constraint: true
    # WLFM specific
    wlfm_vq_embed_dim: 256
    wlfm_num_embeddings: 512     # Codebook size (geological vocabulary)
    wlfm_patch_len: 64
    wlfm_patch_stride: 32
    wlfm_pretrained_path: ""     # Local checkpoint path (when weights released)
    # Legacy params (for cnn_transformer backward compat)
    stem_channels: [32, 64, 128]
    kernel_sizes: [3, 5, 7]

  # Fusion Module
  fusion:
    hidden_dim: 384
    num_cross_attention_heads: 8
    num_fusion_layers: 2
    dropout: 0.1
    use_gating: true

  # Common
  hidden_dim: 384
  output_dim: 256

# Pretraining Configuration
pretraining:
  # Masked Seismic Modeling
  msm:
    mask_ratio: 0.6
    mask_block_size: [8, 16, 16]  # (D, H, W)
    decoder_depth: 4
    decoder_embed_dim: 128
    loss_weight: 1.0

  # Masked Well-log Modeling
  mwm:
    mask_ratio: 0.5
    mask_block_size: 16  # consecutive points to mask
    decoder_layers: 2
    loss_weight: 1.0

  # Cross-Modal Contrastive Learning
  cmcl:
    temperature: 0.07
    projection_dim: 256
    loss_weight: 0.5

  # Seismic-Well Matching
  swm:
    loss_weight: 0.3

  # Training
  epochs: 100
  warmup_epochs: 5
  learning_rate: 1.0e-4
  weight_decay: 0.05
  scheduler: "cosine"

# Finetuning Configuration
finetuning:
  epochs: 50
  warmup_epochs: 3
  learning_rate: 5.0e-5
  weight_decay: 0.01
  freeze_encoder_epochs: 5  # Freeze encoder for first N epochs

# Training Configuration
training:
  seed: 42
  device: "cuda"
  mixed_precision: true       # Use AMP
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2
  log_interval: 50
  save_interval: 5
  eval_interval: 1
  early_stopping_patience: 10
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"

# Loss weights for finetuning
loss_weights:
  fault_bce: 0.5
  fault_dice: 0.5
  reservoir_mse: 0.6
  reservoir_ssim: 0.4
  lithology_ce: 0.7
  lithology_focal: 0.3
